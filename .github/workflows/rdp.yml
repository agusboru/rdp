name: Free Linux RDP

on: 
  workflow_dispatch: # Memungkinkan kamu menjalankan RDP ini secara manual via tombol klik di GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Mengunduh dan Menginstal Dependensi & Chrome Remote Desktop
      run: |
        sudo apt-get update
        
        # Menggunakan libasound2t64 untuk kompatibilitas Ubuntu terbaru
        sudo apt-get install -y \
          gsettings-desktop-schemas \
          pkexec \
          python3-psutil \
          python3-xdg \
          xbase-clients \
          xserver-xorg-video-dummy \
          xvfb \
          libasound2t64 \
          libgbm1 \
          lightdm

        # Unduh paket resmi Chrome Remote Desktop
        wget https://dl.google.com/linux/direct/chrome-remote-desktop_current_amd64.deb
        
        # Install paket .deb
        sudo dpkg --install chrome-remote-desktop_current_amd64.deb
        
        # Auto-fix jika ada dependensi yang kurang
        sudo apt install --assume-yes --fix-broken

    - name: Menginstal Desktop Environment (XFCE4 - Ringan & Stabil)
      run: |
        sudo apt install xfce4-session xfce4-goodies desktop-base xscreensaver -y
        sudo bash -c 'echo "exec /etc/X11/Xsession /usr/bin/xfce4-session" > /etc/chrome-remote-desktop-session'

    - name: Mengonfigurasi Pengguna RDP (rdpuser)
      run: |
        sudo adduser rdpuser --gecos "First Last,RoomNumber,WorkPhone,HomePhone" --disabled-password
        sudo echo "rdpuser:123456" | sudo chpasswd
        sudo usermod -aG sudo rdpuser

    - name: Menjalankan dan Menyambungkan Server RDP
      env:
        CRD_CODE: ${{ secrets.CHROME_REMOTE_DESKTOP_CODE }}
        RDP_PIN: ${{ secrets.RDP_PIN }}
      run: |
        # Menggunakan 'eval' agar sintaks inline variable seperti DISPLAY= atau DEBIAN_FRONTEND= bisa dieksekusi dengan benar
        eval "$CRD_CODE --pin=$RDP_PIN"
        
    - name: Menjaga RDP Tetap Aktif (Looping Maksimal 6 Jam)
      run: |
        echo "=== RDP Berhasil Dibuat! ==="
        echo "Silakan cek halaman browser kamu di: https://remotedesktop.google.com/access"
        # Loop ini penting agar GitHub Runner tidak langsung 'Success' lalu mematikan servernya
        for i in {1..360}; do 
          echo "RDP masih menyala aktif, menit ke-$i..."
          sleep 60
        done
